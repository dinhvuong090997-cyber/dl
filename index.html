<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Downloader - TikTok & YouTube</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',-apple-system,sans-serif;background:#0a0a0f;color:#fff;min-height:100vh;overflow-x:hidden}
.bg{position:fixed;inset:0;pointer-events:none;z-index:0}
.bg::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle at 30% 20%,rgba(255,0,80,.06),transparent 50%),radial-gradient(circle at 70% 80%,rgba(255,0,0,.04),transparent 50%),radial-gradient(circle at 50% 50%,rgba(100,100,255,.03),transparent 60%)}
.container{position:relative;z-index:1;max-width:520px;margin:0 auto;padding:24px 20px;min-height:100vh;display:flex;flex-direction:column}
.logo{text-align:center;padding:28px 0 8px}
.logo .icon{display:inline-flex;align-items:center;justify-content:center;width:60px;height:60px;background:linear-gradient(135deg,#ff0050,#ff4444);border-radius:20px;margin-bottom:14px;font-size:28px;box-shadow:0 10px 40px rgba(255,0,80,.2)}
.logo h1{font-size:24px;font-weight:800;letter-spacing:-.5px}
.logo h1 .t{background:linear-gradient(135deg,#ff0050,#ff6b6b);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo h1 .y{background:linear-gradient(135deg,#ff0000,#ff4444);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo span{display:block;font-size:12px;color:#555;margin-top:3px}

.tabs{display:flex;gap:6px;background:#12121a;border:1px solid #1e1e2a;border-radius:16px;padding:4px;margin-bottom:16px}
.tab{flex:1;padding:12px 8px;border:none;border-radius:13px;background:transparent;color:#666;font-size:13px;font-weight:600;cursor:pointer;transition:.2s;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:5px}
.tab.active{background:#1e1e2e;color:#fff;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.tab .emoji{font-size:16px}

.card-box{background:#12121a;border:1px solid #1e1e2a;border-radius:20px;padding:18px;margin-bottom:14px}
.input-row{display:flex;gap:8px}
.input-row input{flex:1;padding:14px 16px;background:#0a0a0f;border:1.5px solid #1e1e2a;border-radius:14px;color:#fff;font-size:14px;font-family:inherit;outline:none;transition:border .2s}
.input-row input:focus{border-color:#ff0050;box-shadow:0 0 0 3px rgba(255,0,80,.1)}
.input-row input::placeholder{color:#444}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:14px 20px;background:linear-gradient(135deg,#ff0050,#cc0040);border:none;border-radius:14px;color:#fff;font-weight:600;font-size:14px;font-family:inherit;cursor:pointer;white-space:nowrap;transition:.2s;box-shadow:0 4px 16px rgba(255,0,80,.3)}
.btn:active{transform:scale(.96)}
.btn.yt{background:linear-gradient(135deg,#ff0000,#cc0000);box-shadow:0 4px 16px rgba(255,0,0,.3)}
.btn.mp3{background:linear-gradient(135deg,#7c3aed,#6d28d9);box-shadow:0 4px 16px rgba(124,58,237,.3)}

.result-card{background:#12121a;border:1px solid #1e1e2a;border-radius:20px;overflow:hidden;animation:slideUp .3s ease}
.result-card .info{padding:16px}
.result-card .author{color:#00f2ea;font-weight:600;font-size:14px;margin-bottom:4px}
.result-card .title{color:#a0a0b0;font-size:13px;line-height:1.5;margin-bottom:8px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.result-card .meta{display:flex;gap:16px;color:#555;font-size:12px;margin-bottom:14px}
.dl-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:16px;background:linear-gradient(135deg,#00c853,#00e676);border:none;border-radius:14px;color:#000;font-weight:700;font-size:15px;font-family:inherit;text-decoration:none;cursor:pointer;transition:.2s;box-shadow:0 4px 20px rgba(0,200,83,.25)}
.dl-btn:active{transform:scale(.97)}
.dl-btn.mp3{background:linear-gradient(135deg,#7c3aed,#a78bfa);color:#fff}
.loading{text-align:center;padding:40px 20px}
.pulse{width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,#ff0050,#ff4444);margin:0 auto 16px;animation:pulse 1.2s ease infinite}
@keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.1);opacity:.7}}
@keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.error{background:#1a0000;border:1px solid #ff444420;border-radius:16px;padding:16px;text-align:center;color:#ff6666;font-size:13px}
.features{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.feat{flex:1;min-width:70px;background:#12121a;border:1px solid #1e1e2a;border-radius:12px;padding:12px 8px;text-align:center}
.feat .e{font-size:20px;margin-bottom:5px}
.feat .l{font-size:10px;color:#555;font-weight:500}
.footer{text-align:center;color:#333;font-size:11px;padding:24px;margin-top:auto}
</style>
</head>
<body>
<div class="bg"></div>
<div class="container">
<div class="logo">
<div class="icon">⬇️</div>
<h1><span class="t">TikTok</span> + <span class="y">YouTube</span> Downloader</h1>
<span>Tải video không logo • Tách nhạc MP3</span>
</div>

<div class="tabs">
<button class="tab active" onclick="switchTab('tiktok',this)">
<span class="emoji">🎵</span>TikTok
</button>
<button class="tab" onclick="switchTab('youtube',this)">
<span class="emoji">▶️</span>YouTube
</button>
<button class="tab" onclick="switchTab('mp3',this)">
<span class="emoji">🎧</span>MP3
</button>
</div>

<div class="card-box">
<div class="input-row">
<input id="url" type="text" placeholder="Dán link TikTok..." autocomplete="off">
<button class="btn" id="dlBtn" onclick="downloadVideo()">⬇️ Tải</button>
</div>
</div>

<div id="result"></div>

<div class="features" id="features">
<div class="feat"><div class="e">🎬</div><div class="l">TikTok</div></div>
<div class="feat"><div class="e">▶️</div><div class="l">YouTube</div></div>
<div class="feat"><div class="e">🎧</div><div class="l">MP3</div></div>
<div class="feat"><div class="e">⚡</div><div class="l">Nhanh</div></div>
<div class="feat"><div class="e">🔒</div><div class="l">Riêng tư</div></div>
</div>

<div class="footer">✨ Tải video + tách nhạc miễn phí</div>
</div>

<script>
let mode = 'tiktok'
const API = 'https://tikwm.com/api/'

function switchTab(tab, el) {
  mode = tab
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'))
  el.classList.add('active')
  const inp = document.getElementById('url')
  const btn = document.getElementById('dlBtn')
  if(tab==='tiktok'){inp.placeholder='Dán link TikTok...'; btn.className='btn'; btn.textContent='⬇️ Tải'}
  else if(tab==='youtube'){inp.placeholder='Dán link YouTube...'; btn.className='btn yt'; btn.textContent='⬇️ Tải'}
  else{inp.placeholder='Dán link YouTube...'; btn.className='btn mp3'; btn.textContent='🎧 Tách MP3'}
  document.getElementById('result').innerHTML=''
  document.getElementById('features').style.display = tab==='tiktok'?'flex':'none'
}

async function downloadVideo() {
  const url = document.getElementById('url').value.trim()
  if(!url){return}
  document.getElementById('result').innerHTML=`<div class="loading"><div class="pulse"></div><p style="color:#666;font-size:14px">Đang xử lý...</p></div>`

  try {
    const apiUrl = API + '?url=' + encodeURIComponent(url)
    const resp = await fetch(apiUrl)
    const data = await resp.json()
    if(data.code!==0||!data.data) throw new Error('No data')
    const d = data.data
    const title = (d.title||'Video').substring(0,80)
    const author = d.author?.nickname||'Unknown'
    const plays = (d.play_count||0).toLocaleString()

    let videoUrl = '', mp3Url = '', label = 'TẢI VIDEO'
    if(mode==='mp3' && d.music){
      videoUrl = d.music
      label = '🎧 TẢI MP3'
    } else {
      videoUrl = d.play||d.hdplay||''
    }
    if(!videoUrl) throw new Error('No URL')

    const isLocal = location.hostname==='localhost'||location.hostname.startsWith('192.168')
    const dlUrl = isLocal ? `/download?url=${encodeURIComponent(videoUrl)}` : videoUrl

    document.getElementById('result').innerHTML = `
      <div class="result-card">
        <div class="info">
          <div class="author">👤 ${author}</div>
          <div class="title">${title}</div>
          <div class="meta"><span>▶️ ${plays}</span><span>${mode==='mp3'?'🎧 MP3':'🎬 Video'}</span></div>
          <a class="dl-btn${mode==='mp3'?' mp3':''}" href="${dlUrl}" download>${label}</a>
        </div>
      </div>`
  } catch(e) {
    document.getElementById('result').innerHTML = '<div class="error">❌ Không xử lý được. Kiểm tra link hoặc thử lại.</div>'
  }
}
document.getElementById('url').addEventListener('keydown', e=>{if(e.key==='Enter')downloadVideo()})
</script>
</body>
</html>
