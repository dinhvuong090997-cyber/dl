<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>DownLoader Pro - TikTok & YouTube</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',-apple-system,sans-serif;background:#0a0a0f;color:#fff;min-height:100vh;overflow-x:hidden}
.bg{position:fixed;inset:0;pointer-events:none;z-index:0}
.bg::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle at 30% 20%,rgba(255,0,80,.05),transparent 50%),radial-gradient(circle at 70% 60%,rgba(124,58,237,.04),transparent 50%),radial-gradient(circle at 50% 80%,rgba(0,200,83,.03),transparent 60%)}
.container{position:relative;z-index:1;max-width:520px;margin:0 auto;padding:20px 16px;min-height:100vh;display:flex;flex-direction:column}
.logo{text-align:center;padding:20px 0 6px}
.logo .icon{display:inline-flex;align-items:center;justify-content:center;width:56px;height:56px;background:linear-gradient(135deg,#ff0050,#7c3aed);border-radius:18px;margin-bottom:12px;font-size:26px;box-shadow:0 8px 32px rgba(255,0,80,.15)}
.logo h1{font-size:21px;font-weight:800;letter-spacing:-.5px}
.logo h1 span{background:linear-gradient(135deg,#ff0050,#7c3aed);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo .sub{display:block;font-size:11px;color:#555;margin-top:2px}

.tabs{display:grid;grid-template-columns:1fr 1fr;gap:4px;background:#12121a;border:1px solid #1e1e2a;border-radius:14px;padding:3px;margin-bottom:12px}
.tab{flex:1;padding:10px 6px;border:none;border-radius:12px;background:transparent;color:#666;font-size:12px;font-weight:600;cursor:pointer;transition:.2s;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:4px}
.tab.active{background:#1e1e2e;color:#fff}
.tab.act-tt.active{background:rgba(255,0,80,.15);color:#ff6b6b}
.tab.act-yt.active{background:rgba(255,0,0,.15);color:#ff4444}
.tab.act-mp3.active{background:rgba(124,58,237,.15);color:#a78bfa}
.tab.act-beat.active{background:rgba(0,200,83,.15);color:#00e676}
.tab .emoji{font-size:15px}

.card{padding:14px 0}
.inp{display:flex;gap:6px;margin-bottom:10px}
.inp input{flex:1;padding:13px 14px;background:#0a0a0f;border:1.5px solid #1e1e2a;border-radius:13px;color:#fff;font-size:13px;font-family:inherit;outline:none}
.inp input:focus{border-color:#ff0050}
.inp input::placeholder{color:#444}
.btn{display:inline-flex;align-items:center;gap:5px;padding:13px 18px;border:none;border-radius:13px;color:#fff;font-weight:600;font-size:13px;font-family:inherit;cursor:pointer;white-space:nowrap}
.btn:active{transform:scale(.96)}
.btn-tt{background:linear-gradient(135deg,#ff0050,#cc0040)}
.btn-yt{background:linear-gradient(135deg,#ff0000,#cc0000)}
.btn-mp3{background:linear-gradient(135deg,#7c3aed,#6d28d9)}
.btn-beat{background:linear-gradient(135deg,#00c853,#009624)}

.result{margin-top:8px}
.card-r{background:#12121a;border:1px solid #1e1e2a;border-radius:16px;overflow:hidden;animation:up .3s ease;margin-bottom:10px}
.card-r .head{display:flex;align-items:center;gap:10px;padding:14px;border-bottom:1px solid #1e1e2a}
.card-r .thumb{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.card-r .meta{flex:1;min-width:0}
.card-r .author{color:#00f2ea;font-weight:600;font-size:13px}
.card-r .title{color:#777;font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.card-r .actions{display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:12px}
.card-r .actions.full{grid-template-columns:1fr}
.dl{display:flex;align-items:center;justify-content:center;gap:6px;padding:13px;border-radius:12px;font-weight:600;font-size:13px;text-decoration:none;transition:.2s;font-family:inherit;cursor:pointer;border:none}
.dl:active{transform:scale(.97)}
.dl-vid{background:linear-gradient(135deg,#ff0050,#cc0040);color:#fff}
.dl-mp3{background:linear-gradient(135deg,#7c3aed,#6d28d9);color:#fff}
.dl-beat{background:linear-gradient(135deg,#00c853,#009624);color:#000}

.loading{text-align:center;padding:32px}
.dot{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,#ff0050,#7c3aed);margin:0 auto 14px;animation:pulse 1.2s ease infinite}
@keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.15);opacity:.6}}
@keyframes up{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.error{background:#1a0000;border:1px solid #ff444420;border-radius:14px;padding:14px;text-align:center;color:#ff6666;font-size:12px}
.hint{text-align:center;padding:20px 0;color:#333;font-size:12px;line-height:1.8}
.hint b{color:#555}
.footer{text-align:center;color:#2a2a2a;font-size:10px;padding:20px;margin-top:auto}
</style>
</head>
<body>
<div class="bg"></div>
<div class="container">
<div class="logo"><div class="icon">⚡</div><h1><span>DownLoader Pro</span></h1><div class="sub">TikTok • YouTube • MP3 • Tách Beat</div></div>

<div class="tabs">
<button class="tab act-tt active" onclick="setMode('tt',this)"><span class="emoji">🎵</span>TikTok</button>
<button class="tab act-yt" onclick="setMode('yt',this)"><span class="emoji">▶️</span>YouTube</button>
<button class="tab act-mp3" onclick="setMode('mp3',this)"><span class="emoji">🎧</span>Tách MP3</button>
<button class="tab act-beat" onclick="setMode('beat',this)"><span class="emoji">🎼</span>Tách Beat</button>
</div>

<div class="card">
<div class="inp">
<input id="url" type="text" placeholder="Dán link TikTok..." autocomplete="off">
<button class="btn btn-tt" id="goBtn" onclick="go()">⬇️ Tải</button>
</div>
</div>
<div id="result">
<div class="hint">
<b>📎 Cách lấy link:</b><br>TikTok/YouTube → Share → Copy link → Dán vào đây<br>
<b>🎧 MP3:</b> Tách nhạc từ TikTok & YouTube<br>
<b>🎼 Tách Beat:</b> Lấy nhạc nền, bỏ giọng hát
</div></div>
<div class="footer">DownLoader Pro — Miễn phí, không logo</div>
</div>

<script>
let mode='tt'
const API='https://tikwm.com/api/'
const PLACEHOLDERS={tt:'Dán link TikTok...',yt:'Dán link YouTube...',mp3:'Dán link TikTok/YouTube...',beat:'Dán link YouTube (tách beat)...'}
const BTNS={tt:'btn-tt',yt:'btn-yt',mp3:'btn-mp3',beat:'btn-beat'}

function setMode(m,el){
  mode=m
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'))
  el.classList.add('active')
  document.getElementById('url').placeholder=PLACEHOLDERS[m]
  const b=document.getElementById('goBtn')
  b.className='btn '+BTNS[m]
  b.textContent=m==='beat'?'🎼 Tách':'⬇️ Tải'
  document.getElementById('result').innerHTML=`<div class="hint"><b>📎 ${m==='mp3'?'Tách nhạc MP3 từ TikTok & YouTube':m==='beat'?'Tách beat/nhạc nền từ YouTube (bỏ giọng)':'Dán link để tải video không logo'}</b></div>`
}

async function go(){
  const url=document.getElementById('url').value.trim()
  if(!url){return}
  const local=location.hostname==='localhost'||location.hostname.startsWith('192.168')
  const API_BASE=local?`http://${location.hostname}:8888`:''
    document.getElementById('result').innerHTML=`<div class="loading"><div class="dot"></div><p style="color:#666;font-size:13px">Đang xử lý...</p></div>`
    try{
      let info
      if(local){
        const r=await fetch(`${API_BASE}/api/info?url=${encodeURIComponent(url)}`)
        info=await r.json()
        if(!info||!info.title) throw new Error()
      }else{
        const r=await fetch(`https://tikwm.com/api/?url=${encodeURIComponent(url)}`)
        const d=await r.json()
        if(d.code!==0||!d.data) throw new Error()
        const v=d.data; info={title:v.title||'Video',author:v.author?.nickname||'Unknown',video:v.play||v.hdplay||'',audio:v.music||''}
      }
      const title=(info.title||'Video').substring(0,70),author=info.author||'Unknown'
      const vid=info.video||'',music=info.audio||''
      const dl=(u)=>local?`${API_BASE}/dl?url=${encodeURIComponent(u)}`:u

    let html=`<div class="card-r"><div class="head"><div class="thumb" style="background:#1a1a2e">🎬</div><div class="meta"><div class="author">👤 ${author}</div><div class="title">${title}</div></div></div><div class="actions${mode==='beat'?' full':''}">`

    if(mode==='beat'){
      const beatUrl='https://api.allorigins.win/raw?url='+encodeURIComponent((music||vid))
      html+=`<a class="dl dl-beat" href="${music||vid}" download>🎼 Tải Beat / Nhạc nền</a>`
    }else if(mode==='mp3'){
      if(music) html+=`<a class="dl dl-mp3" href="${music}" download>🎧 Tải MP3</a>`
      if(vid) html+=`<a class="dl dl-vid" href="${vid}" download>🎬 Tải Video</a>`
      if(!music&&!vid) throw new Error()
    }else{
      if(vid) html+=`<a class="dl dl-vid" href="${vid}" download>🎬 Tải Video</a>`
      if(music) html+=`<a class="dl dl-mp3" href="${music}" download>🎧 Tải MP3</a>`
      if(!vid&&!music) throw new Error()
    }
    html+=`</div></div>`
    if(mode==='beat') html+=`<div class="error" style="background:#0a1a0a;border-color:#00c85320;color:#00e676">⚠️ Tách beat cần server AI. Đang tải file gốc — dùng app <b>Moises</b> hoặc <b>VocalRemover.org</b> để tách beat miễn phí.</div>`
    document.getElementById('result').innerHTML=html
  }catch(e){
    document.getElementById('result').innerHTML='<div class="error">❌ Không xử lý được. Kiểm tra link hoặc thử link khác.</div>'
  }
}
document.getElementById('url').addEventListener('keydown',e=>{if(e.key==='Enter')go()})
</script>
</body>
</html>
